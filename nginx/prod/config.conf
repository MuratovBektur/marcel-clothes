# Файл: marcel-clothes/nginx/prod/default.conf
#
# SSL убран — терминируется на docker-gateway.
# Слушаем только порт 80 внутри сети gateway_network.

server {
    listen 80;
    listen [::]:80;
    server_name marcel.kg www.marcel.kg;

    access_log /var/log/nginx/marcel.kg.access.log;
    error_log  /var/log/nginx/marcel.kg.error.log;

    location /uploads/ {
        alias /usr/share/nginx/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~ ^/(api|ws) {
        client_max_body_size 100m;

        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header Host              $http_host;
        proxy_set_header X-NginX-Proxy     true;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_pass http://server:5000;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_pass http://client:3000;

        add_header X-Robots-Tag "index, follow" always;
    }
}
